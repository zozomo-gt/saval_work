<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="재고관리">
<meta name="theme-color" content="#0D0F18">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>재고관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0D0F18;--surf:#161927;--surf2:#1E2235;
  --border:#2A2F50;--border2:#373D66;
  --text:#DDE1F9;--text2:#8890C4;--text3:#4A5080;
  --accent:#5B6EFF;--accent2:#7B8FFF;
  --plus:#10B981;--minus:#EF4444;--low:#F59E0B;
  --r:12px;--rs:8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* ── TOPBAR ── */
.topbar{
  background:var(--surf);
  border-bottom:1px solid var(--border);
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.topbar-title{font-size:15px;font-weight:700;flex:1;letter-spacing:-.3px}
.ts{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:1.4;text-align:right}
.ts span{color:var(--accent2);display:block}
.btn-dl{
  display:flex;align-items:center;gap:4px;
  padding:8px 13px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--rs);font-size:12px;
  font-family:inherit;font-weight:500;cursor:pointer;
  white-space:nowrap;flex-shrink:0;
}
.btn-dl:active{opacity:.8}

/* ── CAT TABS (horizontal scroll) ── */
.cat-tabs{
  display:flex;gap:6px;
  overflow-x:auto;padding:10px 16px;
  background:var(--surf);border-bottom:1px solid var(--border);
  flex-shrink:0;
  scrollbar-width:none;
}
.cat-tabs::-webkit-scrollbar{display:none}
.tab{
  padding:7px 16px;border-radius:20px;
  border:1px solid var(--border2);background:transparent;
  color:var(--text2);font-size:13px;font-family:inherit;font-weight:500;
  cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── SCROLL AREA ── */
.scroll-area{
  flex:1;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:16px 16px calc(var(--safe-bottom) + 80px);
}
.scroll-area::-webkit-scrollbar{display:none}

/* ── PANEL ── */
.cat-panel{display:none}
.cat-panel.active{display:block}
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.panel-title{font-size:15px;font-weight:700}
.panel-badge{
  font-size:12px;font-weight:600;
  color:var(--accent2);background:rgba(91,110,255,.15);
  border-radius:20px;padding:3px 12px;
  font-family:'JetBrains Mono',monospace;
}

/* ── INVENTORY GRID ── */
.inv-card{
  background:var(--surf);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;margin-bottom:12px;
}
.color-header{
  display:flex;align-items:center;gap:8px;
  padding:11px 14px;background:var(--surf2);
  border-bottom:1px solid var(--border);
}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cdot.w{background:#DEDEDE;border:1px solid #666}
.cdot.b{background:#222;border:1px solid #555}
.cdot.g{background:#7A7A7A}
.color-name{font-size:13px;font-weight:600;flex:1}
.color-subtotal{
  font-size:12px;font-weight:700;
  font-family:'JetBrains Mono',monospace;color:var(--accent2);
}

/* SIZE ROWS */
.size-row{
  display:flex;align-items:center;
  padding:10px 14px;border-bottom:1px solid var(--border);
  gap:12px;
}
.size-row:last-child{border-bottom:none}
.size-label{
  font-size:13px;font-weight:500;color:var(--text2);
  min-width:52px;
}
.qty-ctrl{
  display:flex;align-items:center;gap:0;
  background:var(--surf2);border:1px solid var(--border2);
  border-radius:var(--rs);overflow:hidden;flex-shrink:0;
}
.qbtn{
  width:44px;height:44px;border:none;background:transparent;
  cursor:pointer;font-size:22px;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .1s;flex-shrink:0;
}
.qbtn.minus:active{background:rgba(239,68,68,.2);color:var(--minus)}
.qbtn.plus:active{background:rgba(16,185,129,.2);color:var(--plus)}
.qnum{
  min-width:48px;text-align:center;
  font-size:18px;font-weight:700;
  font-family:'JetBrains Mono',monospace;
  color:var(--text);
  border-left:1px solid var(--border2);
  border-right:1px solid var(--border2);
  padding:0 4px;line-height:44px;
}
.qnum.zero{color:var(--minus)}
.qnum.low{color:var(--low)}

/* SIZE TOTAL (우측) */
.size-total-area{flex:1;text-align:right}
.size-note{font-size:11px;color:var(--text3);line-height:1.4}

/* SUM ROW */
.sum-strip{
  display:flex;overflow-x:auto;
  background:rgba(91,110,255,.07);
  border-top:1px solid var(--border2);
  scrollbar-width:none;
}
.sum-strip::-webkit-scrollbar{display:none}
.sum-item{
  display:flex;flex-direction:column;align-items:center;
  padding:8px 14px;border-right:1px solid var(--border);
  flex-shrink:0;min-width:64px;
}
.sum-item:last-child{border-right:none}
.sum-sz{font-size:10px;color:var(--text3);margin-bottom:2px}
.sum-val{
  font-size:13px;font-weight:700;
  font-family:'JetBrains Mono',monospace;color:var(--accent2);
}

/* flash */
@keyframes fplus{0%,100%{}40%{background:rgba(16,185,129,.18)}}
@keyframes fminus{0%,100%{}40%{background:rgba(239,68,68,.13)}}
.fplus{animation:fplus .3s ease}
.fminus{animation:fminus .3s ease}

/* ── LOG DRAWER ── */
.log-fab{
  position:fixed;bottom:calc(var(--safe-bottom) + 16px);right:16px;
  width:52px;height:52px;border-radius:50%;
  background:var(--surf2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.4);
  z-index:50;
}
.log-fab .badge{
  position:absolute;top:-4px;right:-4px;
  background:var(--minus);color:#fff;
  border-radius:10px;padding:1px 5px;
  font-size:10px;font-weight:700;
  display:none;
}
.log-fab .badge.show{display:block}

.log-drawer{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;justify-content:flex-end;
  background:rgba(0,0,0,.5);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.log-drawer.open{opacity:1;pointer-events:all}
.log-sheet{
  background:var(--surf);
  border-radius:20px 20px 0 0;
  padding-bottom:calc(var(--safe-bottom) + 8px);
  max-height:70vh;
  display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.log-drawer.open .log-sheet{transform:translateY(0)}
.log-handle{
  width:36px;height:4px;background:var(--border2);border-radius:2px;
  margin:12px auto 0;flex-shrink:0;
}
.log-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.log-head h3{font-size:14px;font-weight:600}
.log-clear-btn{
  font-size:12px;color:var(--text3);border:none;background:none;
  font-family:inherit;cursor:pointer;padding:4px 8px;
}
.log-scroll{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.log-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-bottom:1px solid var(--border);
  animation:fi .2s ease;
}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1}}
.log-item:last-child{border-bottom:none}
.lt{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;min-width:44px}
.ld{font-size:12px;color:var(--text2);flex:1;line-height:1.5}
.ld b{color:var(--text);font-weight:600}
.ldelta{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
.ldelta.p{color:var(--plus)}
.ldelta.m{color:var(--minus)}
.log-empty{padding:32px 16px;text-align:center;color:var(--text3);font-size:13px}

/* legend */
.legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.ld2{width:8px;height:8px;border-radius:50%}

/* ── MEMO ── */
.size-row{flex-wrap:wrap;gap:8px}
.memo-area{flex:1;display:flex;align-items:center;min-width:60px}
.memo-add-btn{
  background:transparent;border:1px dashed var(--border2);
  border-radius:6px;padding:4px 10px;font-size:11px;
  color:var(--text3);font-family:inherit;cursor:pointer;
  white-space:nowrap;transition:all .15s;
}
.memo-add-btn:active{border-color:var(--accent);color:var(--accent)}
.memo-tag{
  background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);
  border-radius:6px;padding:4px 10px;font-size:11px;
  color:var(--low);cursor:pointer;max-width:100%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-family:'Noto Sans KR',sans-serif;
}
.memo-tag:active{opacity:.7}

/* ── MEMO MODAL ── */
.memo-modal-bg{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.6);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.memo-modal-bg.open{opacity:1;pointer-events:all}
.memo-modal{
  width:100%;max-width:500px;
  background:var(--surf);border-radius:20px 20px 0 0;
  padding:0 0 calc(env(safe-area-inset-bottom,0px) + 16px);
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.memo-modal-bg.open .memo-modal{transform:translateY(0)}
.memo-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.memo-modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;
}
.memo-modal-head h3{font-size:14px;font-weight:600}
.memo-modal-label{font-size:12px;color:var(--text2);padding:0 16px 8px}
.memo-input{
  width:calc(100% - 32px);margin:0 16px;
  background:var(--surf2);border:1px solid var(--border2);
  border-radius:var(--rs);padding:12px 14px;
  font-size:15px;font-family:inherit;color:var(--text);
  outline:none;
}
.memo-input:focus{border-color:var(--accent)}
.memo-actions{display:flex;gap:10px;padding:12px 16px 0}
.memo-save-btn{
  flex:1;padding:12px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--rs);font-size:14px;
  font-family:inherit;font-weight:500;cursor:pointer;
}
.memo-delete-btn{
  padding:12px 16px;background:transparent;color:var(--minus);
  border:1px solid rgba(239,68,68,.3);border-radius:var(--rs);
  font-size:13px;font-family:inherit;cursor:pointer;
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">📦 재고관리</div>
  <div class="ts">저장됨<span id="ts">—</span></div>
  <button class="btn-dl" onclick="downloadExcel()">
    <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 9.293a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z"/></svg>
    엑셀
  </button>
</div>

<!-- CAT TABS -->
<div class="cat-tabs" id="cat-tabs"></div>

<!-- SCROLL AREA -->
<div class="scroll-area" id="scroll-area">
  <div id="panels"></div>
</div>

<!-- LOG FAB -->
<div class="log-fab" onclick="openLog()">
  📋<div class="badge" id="log-badge">0</div>
</div>

<!-- LOG DRAWER -->
<div class="log-drawer" id="log-drawer" onclick="closeLogIfBg(event)">
  <div class="log-sheet" id="log-sheet">
    <div class="log-handle"></div>
    <div class="log-head">
      <h3>변경 기록</h3>
      <button class="log-clear-btn" onclick="clearLog()">전체 삭제</button>
    </div>
    <div class="log-scroll" id="log-list">
      <div class="log-empty">아직 변경 내역이 없어요</div>
    </div>
  </div>
</div>


<!-- MEMO MODAL -->
<div class="memo-modal-bg" id="memo-modal-bg" onclick="closeMemoIfBg(event)">
  <div class="memo-modal">
    <div class="memo-handle"></div>
    <div class="memo-modal-head">
      <h3 id="memo-modal-title">메모</h3>
      <button class="memo-delete-btn" onclick="deleteMemo()" id="memo-del-btn" style="border:none;background:none;color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer">삭제</button>
    </div>
    <div class="memo-modal-label" id="memo-modal-label"></div>
    <input class="memo-input" id="memo-input" type="text" placeholder="메모를 입력하세요..." maxlength="30">
    <div class="memo-actions">
      <button class="memo-save-btn" onclick="saveMemo()">저장</button>
    </div>
  </div>
</div>

<script>
// ── 데이터 ────────────────────────────────────────────
const INVENTORY_KEY = 'printstar_inventory_v1';
const UPDATED_KEY   = 'printstar_updated_v1';
const MEMO_KEY      = 'printstar_memo_v1';

let memos = {}; // key: "ci-color-sz" → string

const DEFAULT_DATA = [
  {
    name:'반팔', colors:['화이트','블랙','그레이'],
    sizes:['S','M','L','XL','2XL','3XL'],
    data:{
      '화이트':{S:8,M:10,L:9,XL:11,'2XL':10,'3XL':12},
      '블랙':  {S:7,M:9, L:10,XL:9, '2XL':10,'3XL':14},
      '그레이':{S:5,M:5, L:6, XL:6, '2XL':4, '3XL':3},
    }
  },
  {
    name:'긴팔', colors:['화이트','블랙','그레이'],
    sizes:['S','M','L','XL','2XL'],
    data:{
      '화이트':{S:2,M:2,L:3,XL:3,'2XL':4},
      '블랙':  {S:3,M:2,L:4,XL:3,'2XL':3},
      '그레이':{S:4,M:3,L:5,XL:2,'2XL':4},
    }
  },
  {
    name:'맨투맨', colors:['화이트','블랙','그레이'],
    sizes:['S','M','L','XL','2XL','3XL'],
    data:{
      '화이트':{S:1,M:0,L:0,XL:0,'2XL':0,'3XL':5},
      '블랙':  {S:1,M:1,L:1,XL:1,'2XL':1,'3XL':1},
      '그레이':{S:0,M:1,L:2,XL:0,'2XL':2,'3XL':2},
    }
  },
  {
    name:'후드', colors:['화이트','블랙','그레이'],
    sizes:['S','M','L','XL','2XL','3XL','4XL'],
    data:{
      '화이트':{S:2,M:2,L:1,XL:1,'2XL':1,'3XL':0,'4XL':2},
      '블랙':  {S:1,M:0,L:1,XL:1,'2XL':1,'3XL':1,'4XL':1},
      '그레이':{S:1,M:0,L:1,XL:2,'2XL':1,'3XL':1,'4XL':2},
    }
  },
  {
    name:'아동복', colors:['화이트','블랙','그레이'],
    sizes:['XS(110)','S(120)','M(130)','L(140)','XL(150)'],
    data:{
      '화이트':{'XS(110)':3,'S(120)':3,'M(130)':5,'L(140)':3,'XL(150)':3},
      '블랙':  {'XS(110)':4,'S(120)':3,'M(130)':3,'L(140)':3,'XL(150)':4},
      '그레이':{'XS(110)':0,'S(120)':0,'M(130)':0,'L(140)':0,'XL(150)':0},
    }
  },
];

const CDOT = {'화이트':'w','블랙':'b','그레이':'g'};
let inventory = [], logs = [], currentCat = 0;

// ── localStorage ────────────────────────────────────
function saveToStorage() {
  try {
    localStorage.setItem(INVENTORY_KEY, JSON.stringify(inventory));
    localStorage.setItem(MEMO_KEY, JSON.stringify(memos));
    const now = new Date();
    localStorage.setItem(UPDATED_KEY, now.toISOString());
    updateTimestamp(now);
  } catch(e) {}
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem(INVENTORY_KEY);
    if (saved) {
      inventory = JSON.parse(saved);
      const ts = localStorage.getItem(UPDATED_KEY);
      if (ts) updateTimestamp(new Date(ts));
      try { const sm = localStorage.getItem(MEMO_KEY); if(sm) memos=JSON.parse(sm); } catch(e){}
      return true;
    }
  } catch(e) {}
  inventory = JSON.parse(JSON.stringify(DEFAULT_DATA));
  return false;
}

function updateTimestamp(d) {
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('ts').textContent =
    `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ── BUILD UI ─────────────────────────────────────────
function buildUI() {
  // tabs
  document.getElementById('cat-tabs').innerHTML = inventory.map((cat,i) =>
    `<button class="tab${i===0?' active':''}" id="tab-${i}" onclick="switchCat(${i})">${cat.name}</button>`
  ).join('');

  // panels
  document.getElementById('panels').innerHTML = inventory.map((cat,ci) => {
    const colorCards = cat.colors.map(color => {
      const dot = CDOT[color];
      const subtotal = cat.sizes.reduce((s,sz)=>s+(cat.data[color][sz]||0),0);

      const sizeRows = cat.sizes.map(sz => {
        const q = cat.data[color][sz] || 0;
        const cls = q===0?'zero':q<=3?'low':'';
        const memoKey = `${ci}-${color}-${sz}`;
        const memoVal = memos[memoKey] || '';
        return `<div class="size-row" id="srow-${ci}-${color}-${sz}">
          <div class="size-label">${sz}</div>
          <div class="qty-ctrl">
            <button class="qbtn minus" onclick="adjust(${ci},'${color}','${sz}',-1)">−</button>
            <div class="qnum ${cls}" id="num-${ci}-${color}-${sz}">${q}</div>
            <button class="qbtn plus"  onclick="adjust(${ci},'${color}','${sz}',1)">+</button>
          </div>
          <div class="memo-area" id="memo-area-${memoKey}">
            ${memoVal ? `<div class="memo-tag" onclick="openMemo(${ci},'${color}','${sz}')">${memoVal}</div>` : `<button class="memo-add-btn" onclick="openMemo(${ci},'${color}','${sz}')">+메모</button>`}
          </div>
        </div>`;
      }).join('');

      const sumItems = cat.sizes.map(sz => {
        const s = cat.colors.reduce((a,c)=>a+(cat.data[c][sz]||0),0);
        return `<div class="sum-item">
          <div class="sum-sz">${sz}</div>
          <div class="sum-val" id="cs-${ci}-${sz}">${s}</div>
        </div>`;
      }).join('');

      return `<div class="inv-card">
        <div class="color-header">
          <div class="cdot ${dot}"></div>
          <div class="color-name">${color}</div>
          <div class="color-subtotal" id="rt-${ci}-${color}">${subtotal}</div>
        </div>
        ${sizeRows}
        <div class="sum-strip">${sumItems}</div>
      </div>`;
    }).join('');

    const total = catTotal(cat);
    return `<div class="cat-panel${ci===0?' active':''}" id="panel-${ci}">
      <div class="panel-header">
        <div class="panel-title">${cat.name}</div>
        <div class="panel-badge" id="ptb-${ci}">${total}개</div>
      </div>
      <div class="legend">
        <div class="li"><div class="ld2" style="background:var(--text)"></div>정상</div>
        <div class="li"><div class="ld2" style="background:var(--low)"></div>1–3개 (주의)</div>
        <div class="li"><div class="ld2" style="background:var(--minus)"></div>0개</div>
      </div>
      ${colorCards}
    </div>`;
  }).join('');
}

function catTotal(cat) {
  return cat.colors.reduce((s,c)=>s+cat.sizes.reduce((s2,sz)=>s2+(cat.data[c][sz]||0),0),0);
}

function switchCat(idx) {
  currentCat = idx;
  document.querySelectorAll('.cat-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.getElementById('scroll-area').scrollTop = 0;
}

// ── ADJUST ───────────────────────────────────────────
function adjust(ci, color, sz, delta) {
  const cat = inventory[ci];
  const old = cat.data[color][sz] || 0;
  const next = Math.max(0, old + delta);
  if (next === old) return;
  cat.data[color][sz] = next;

  // 숫자 업데이트
  const numEl = document.getElementById(`num-${ci}-${color}-${sz}`);
  if (numEl) { numEl.textContent=next; numEl.className='qnum'+(next===0?' zero':next<=3?' low':''); }

  // row flash
  const rowEl = document.getElementById(`srow-${ci}-${color}-${sz}`);
  if (rowEl) { rowEl.classList.remove('fplus','fminus'); void rowEl.offsetWidth; rowEl.classList.add(delta>0?'fplus':'fminus'); }

  // 컬러 소계
  const rt = cat.sizes.reduce((s,s2)=>s+(cat.data[color][s2]||0),0);
  const rtEl = document.getElementById(`rt-${ci}-${color}`);
  if (rtEl) rtEl.textContent = rt;

  // 사이즈 합계 (하단 strip)
  const cs = cat.colors.reduce((s,c)=>s+(cat.data[c][sz]||0),0);
  const csEl = document.getElementById(`cs-${ci}-${sz}`);
  if (csEl) csEl.textContent = cs;

  // 카테고리 배지
  const ct = catTotal(cat);
  const ptbEl = document.getElementById(`ptb-${ci}`);
  if (ptbEl) ptbEl.textContent = ct+'개';
  const tabEl = document.getElementById(`tab-${ci}`);
  // tab badge 없이 이름만 (심플하게)

  // 저장
  saveToStorage();

  // 로그
  const now = new Date();
  const pad = n=>String(n).padStart(2,'0');
  const t = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  logs.unshift({t, cat:cat.name, color, sz, delta, result:next});
  if (logs.length>100) logs.pop();
  updateLogBadge();
  if (document.getElementById('log-drawer').classList.contains('open')) renderLog();
}

// ── LOG ──────────────────────────────────────────────
function updateLogBadge() {
  const badge = document.getElementById('log-badge');
  badge.textContent = logs.length;
  badge.classList.toggle('show', logs.length > 0);
}
function openLog() {
  renderLog();
  document.getElementById('log-drawer').classList.add('open');
}
function closeLogIfBg(e) {
  if (e.target === document.getElementById('log-drawer')) closeLog();
}
function closeLog() {
  document.getElementById('log-drawer').classList.remove('open');
}
function clearLog() { logs=[]; renderLog(); updateLogBadge(); }
function renderLog() {
  const el = document.getElementById('log-list');
  if (!logs.length) { el.innerHTML='<div class="log-empty">아직 변경 내역이 없어요</div>'; return; }
  el.innerHTML = logs.map(l => {
    const s = l.delta>0?'+':'';
    return `<div class="log-item">
      <div class="lt">${l.t}</div>
      <div class="ld"><b>${l.cat}</b> ${l.color} ${l.sz} → ${l.result}개</div>
      <div class="ldelta ${l.delta>0?'p':'m'}">${s}${l.delta}</div>
    </div>`;
  }).join('');
}

// ── EXCEL EXPORT ─────────────────────────────────────
function downloadExcel() {
  const wb = XLSX.utils.book_new();
  inventory.forEach(cat => {
    const rows = [
      [cat.name + ' 재고 현황'],
      ['컬러', ...cat.sizes, '합계'],
    ];
    cat.colors.forEach(color => {
      const qtys = cat.sizes.map(sz => cat.data[color][sz]||0);
      rows.push([color, ...qtys, qtys.reduce((a,b)=>a+b,0)]);
    });
    // 사이즈 합계
    const sumRow = ['사이즈 합계', ...cat.sizes.map(sz=>cat.colors.reduce((a,c)=>a+(cat.data[c][sz]||0),0))];
    sumRow.push(sumRow.slice(1).reduce((a,b)=>a+b,0));
    rows.push(sumRow);
    const ws = XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb, ws, cat.name);
  });
  const pad = n=>String(n).padStart(2,'0');
  const d = new Date();
  const suffix = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
  XLSX.writeFile(wb, `프린트스타_길단_재고관리_${suffix}.xlsx`);
}

// ── PWA SERVICE WORKER ───────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}


// ── MEMO ─────────────────────────────────────────────
let currentMemoKey = null;

function openMemo(ci, color, sz) {
  currentMemoKey = `${ci}-${color}-${sz}`;
  const cat = inventory[ci];
  document.getElementById('memo-modal-title').textContent = '메모';
  document.getElementById('memo-modal-label').textContent = `${cat.name} · ${color} · ${sz}`;
  document.getElementById('memo-input').value = memos[currentMemoKey] || '';
  document.getElementById('memo-modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('memo-input').focus(), 350);
}

function closeMemoIfBg(e) {
  if (e.target === document.getElementById('memo-modal-bg')) closeMemoModal();
}
function closeMemoModal() {
  document.getElementById('memo-modal-bg').classList.remove('open');
  currentMemoKey = null;
}

function saveMemo() {
  if (!currentMemoKey) return;
  const val = document.getElementById('memo-input').value.trim();
  if (val) {
    memos[currentMemoKey] = val;
  } else {
    delete memos[currentMemoKey];
  }
  saveToStorage();
  updateMemoUI(currentMemoKey, val);
  closeMemoModal();
}

function deleteMemo() {
  if (!currentMemoKey) return;
  delete memos[currentMemoKey];
  saveToStorage();
  updateMemoUI(currentMemoKey, '');
  closeMemoModal();
}

function updateMemoUI(key, val) {
  // key = "ci-color-sz"
  const parts = key.split('-');
  const ci = parts[0];
  // color might have dash? no — use full key structure
  // rebuild from inventory
  inventory.forEach((cat, cIdx) => {
    if (String(cIdx) !== ci) return;
    cat.colors.forEach(color => {
      cat.sizes.forEach(sz => {
        const k = `${cIdx}-${color}-${sz}`;
        if (k !== key) return;
        const areaId = `memo-area-${cIdx}-${color}-${sz}`;
        const el = document.getElementById(areaId);
        if (!el) return;
        if (val) {
          el.innerHTML = `<div class="memo-tag" onclick="openMemo(${cIdx},'${color}','${sz}')">${val}</div>`;
        } else {
          el.innerHTML = `<button class="memo-add-btn" onclick="openMemo(${cIdx},'${color}','${sz}')">+메모</button>`;
        }
      });
    });
  });
}

// ── INIT ─────────────────────────────────────────────
loadFromStorage();
buildUI();
</script>
